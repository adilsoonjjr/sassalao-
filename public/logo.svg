<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9b8cb"/>
      <stop offset="100%" style="stop-color:#e8829a"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c040"/>
      <stop offset="100%" style="stop-color:#d4a020"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="10" y="10" width="180" height="180" rx="40" ry="40" fill="url(#bgGrad)"/>
  <!-- Calendar body -->
  <rect x="42" y="58" width="116" height="98" rx="10" ry="10" fill="white" opacity="0.92"/>
  <!-- Calendar header bar -->
  <rect x="42" y="58" width="116" height="28" rx="10" ry="10" fill="#c06080"/>
  <rect x="42" y="72" width="116" height="14" fill="#c06080"/>
  <!-- Rings -->
  <rect x="70" y="46" width="10" height="22" rx="5" ry="5" fill="#a04060"/>
  <rect x="120" y="46" width="10" height="22" rx="5" ry="5" fill="#a04060"/>
  <!-- Calendar grid dots -->
  <rect x="56" y="100" width="10" height="10" rx="2" fill="#e8a0b0" opacity="0.7"/>
  <rect x="74" y="100" width="10" height="10" rx="2" fill="#e8a0b0" opacity="0.7"/>
  <rect x="92" y="100" width="10" height="10" rx="2" fill="#e8a0b0" opacity="0.7"/>
  <rect x="56" y="116" width="10" height="10" rx="2" fill="#e8a0b0" opacity="0.7"/>
  <rect x="74" y="116" width="10" height="10" rx="2" fill="#e8a0b0" opacity="0.7"/>
  <!-- Leaf decoration -->
  <path d="M 38 130 Q 28 110 35 90 Q 48 105 38 130 Z" fill="#c8806a" opacity="0.6"/>
  <path d="M 38 125 Q 30 108 36 92" stroke="#a06048" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Dollar coin -->
  <circle cx="130" cy="128" r="24" fill="url(#coinGrad)" stroke="white" stroke-width="3"/>
  <!-- Dollar sign -->
  <text x="130" y="136" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">$</text>
  <!-- Checkmark on coin -->
  <path d="M 118 122 L 125 130 L 142 116" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
</svg>
